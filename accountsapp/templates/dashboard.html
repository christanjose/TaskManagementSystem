{% extends "base.html" %}
{% block content %}

<div class="page-content">
    <section class="row">

        <!-- Total Projects -->
        <div class="col-6 col-lg-3 col-md-6">
            <div class="card bg-primary text-white">
                <div class="card-body px-3 py-4-5">
                    <div class="row">
                        <div class="col-md-4">
                            <div class="stats-icon purple">
                                <i class="bi bi-folder-fill"></i>
                            </div>
                        </div>
                        <div class="col-md-8">
                            <h6 class="text-white">Projects</h6>
                            <h6 class="font-extrabold mb-0">{{ project_count }}</h6>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Total Members -->
        <div class="col-6 col-lg-3 col-md-6">
            <div class="card bg-success text-white">
                <div class="card-body px-3 py-4-5">
                    <div class="row">
                        <div class="col-md-4">
                            <div class="stats-icon green">
                                <i class="bi bi-people-fill"></i>
                            </div>
                        </div>
                        <div class="col-md-8">
                            <h6 class="text-white">Members</h6>
                            <h6 class="font-extrabold mb-0">{{ user_count }}</h6>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Total Tasks -->
        <div class="col-6 col-lg-3 col-md-6">
            <div class="card bg-warning text-white">
                <div class="card-body px-3 py-4-5">
                    <div class="row">
                        <div class="col-md-4">
                            <div class="stats-icon yellow">
                                <i class="bi bi-list-task"></i>
                            </div>
                        </div>
                        <div class="col-md-8">
                            <h6 class="text-white">Tasks</h6>
                            <h6 class="font-extrabold mb-0">{{ task_count }}</h6>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Completed Tasks -->
        <div class="col-6 col-lg-3 col-md-6">
            <div class="card bg-danger text-white">
                <div class="card-body px-3 py-4-5">
                    <div class="row">
                        <div class="col-md-4">
                            <div class="stats-icon red">
                                <i class="bi bi-check-circle-fill"></i>
                            </div>
                        </div>
                        <div class="col-md-8">
                            <h6 class="text-white">Completed</h6>
                            <h6 class="font-extrabold mb-0">{{ completed_tasks }}</h6>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </section>
</div>

{% endblock %}
