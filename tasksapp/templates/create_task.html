{% extends "base.html" %}
{% block content %}

<div class="card">

    <!-- Project Name  -->
    <div class="card-header">
        <h4>Create Task - {{ project.Project_Name }}</h4>
    </div>

    <div class="card-body">

        <form method="POST" action="{% url 'save_task' %}">
        {% csrf_token %}
        <input type="hidden" name="project_id" value="{{ project.id }}">

        <!-- Task Title -->
        <div class="mb-3">
            <label class="form-label">Task Title</label>
            <input type="text" name="task_title" class="form-control" placeholder="Enter Task Title" required>
        </div>

        <!-- Task Description  -->
        <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea name="task_description" class="form-control" rows="3" placeholder="Enter task description"></textarea>
        </div>

        <!-- Assign Member -->
        <div class="mb-3">
            <label class="form-label">Assign Member</label>
            <select name="assigned_to" class="form-select">

                {% for member in members %}
                <option value="{{ member.id }}">{{ member.username }}</option>
                {% endfor %}

            </select>
        </div>

        <!-- Priority -->
        <div class="mb-3">
            <label class="form-label">Priority</label>
            <select name="priority" class="form-select">
                <option value="low">Low</option>
                <option value="medium" selected>Medium</option>
                <option value="high">High</option>
            </select>
        </div>

        <!-- Due Date  -->
        <div class="mb-3">
            <label class="form-label">Due Date</label>
            <input type="date" name="due_date" class="form-control">
        </div>

        <!-- Button -->
        <div class="d-flex justify-content-end gap-2">

        <button type="submit" class="btn btn-primary d-flex align-items-center justify-content-center gap-1">
        <i class="bi bi-check-circle"></i>
        <span>Create Task</span>
        </button>

        <button type="reset" class="btn btn-light-secondary d-flex align-items-center justify-content-center gap-1">
        <i class="bi bi-x-circle"></i>
        <span>Reset</span>
        </button>

        </div>

        </form>
    </div>
</div>

{% endblock %}
